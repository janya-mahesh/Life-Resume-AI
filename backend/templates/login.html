<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mentora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12141c;
            --bg-card: rgba(20, 22, 32, 0.85);
            --accent-blue: #4a7cf7;
            --accent-blue-light: #7b9cff;
            --accent-gold: #d4af37;
            --text-primary: #e8e8ef;
            --text-secondary: #9ca3af;
            --border-color: #2a2d3a;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(74,124,247,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(123,156,255,0.05) 0%, transparent 50%);
            animation: gradient-shift 15s ease infinite;
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }
        .orb-1 {
            width: 300px; height: 300px;
            background: rgba(74,124,247,0.15);
            top: 10%; left: 15%;
            animation: float-orb 20s ease-in-out infinite;
        }
        .orb-2 {
            width: 250px; height: 250px;
            background: rgba(212,175,55,0.1);
            bottom: 15%; right: 10%;
            animation: float-orb 25s ease-in-out infinite reverse;
        }

        @keyframes gradient-shift {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes float-orb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(74,124,247,0.2); }
            50% { box-shadow: 0 0 40px rgba(74,124,247,0.4); }
        }

        .login-card {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(74,124,247,0.15);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.8s ease-out;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(74,124,247,0.12);
        }

        /* Shimmer border effect */
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            background: linear-gradient(135deg, transparent 30%, rgba(74,124,247,0.3) 50%, transparent 70%);
            background-size: 200% 200%;
            z-index: -1;
            animation: shimmer 4s ease-in-out infinite;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }
        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 12px rgba(74,124,247,0.4));
        }
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 36px;
            font-weight: 300;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out both;
        }
        .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-group:nth-child(2) { animation-delay: 0.4s; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(10, 10, 15, 0.6);
            color: var(--text-primary);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 16px rgba(74,124,247,0.2);
        }
        .form-group input::placeholder {
            color: #555;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(74,124,247,0.3);
            margin-top: 8px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
            letter-spacing: 0.02em;
        }
        .btn-submit:hover {
            box-shadow: 0 6px 35px rgba(74,124,247,0.5);
            transform: translateY(-2px);
        }

        .link-bar {
            text-align: center;
            margin-top: 24px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        .link-bar a {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .link-bar a:hover {
            color: var(--accent-blue-light);
            text-decoration: underline;
        }
        .link-bar span {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .error-msg {
            background: rgba(240,92,92,0.1);
            border: 1px solid rgba(240,92,92,0.3);
            color: #f05c5c;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        @media (max-width: 480px) {
            .login-card { margin: 20px; padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">Mentora</span>
        </div>
        <p class="tagline">Your AI-Powered Life Coach</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit" id="loginBtn">Sign In</button>
        </form>

        <div class="link-bar">
            <span>Don't have an account? </span><a href="/register">Create one</a>
        </div>
    </div>
</body>
</html>
