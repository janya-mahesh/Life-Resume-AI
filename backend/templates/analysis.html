<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Time Analysis | Mentora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0a0f; --bg-card: rgba(20, 22, 32, 0.85);
            --accent-blue: #4a7cf7; --accent-blue-light: #7b9cff; --accent-gold: #d4af37;
            --text-primary: #e8e8ef; --text-secondary: #9ca3af; --border-color: #2a2d3a;
        }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: var(--bg-primary); color: var(--text-primary); }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(74,124,247,0.05) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 40px; background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(74,124,247,0.1);
        }
        .navbar .logo { display: flex; align-items: center; gap: 10px; }
        .navbar .logo-icon { font-size: 24px; }
        .navbar .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text-primary); }

        .page-content { max-width: 900px; margin: 0 auto; padding: 48px 20px 60px; position: relative; z-index: 1; }
        .page-title { text-align: center; margin-bottom: 40px; animation: fadeInUp 0.7s ease-out; }
        .page-title h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
        .page-title .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 6px; font-weight: 300; }

        /* Stat cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 36px; }
        .stat-card {
            background: var(--bg-card); backdrop-filter: blur(16px);
            border: 1px solid rgba(74,124,247,0.1); border-radius: 16px;
            padding: 28px 24px; text-align: center;
            transition: all 0.4s ease;
        }
        .stat-card:nth-child(1) { animation: fadeInUp 0.7s ease-out 0.15s both; border-top: 3px solid var(--accent-blue); }
        .stat-card:nth-child(2) { animation: fadeInUp 0.7s ease-out 0.25s both; border-top: 3px solid var(--accent-gold); }
        .stat-card:nth-child(3) { animation: fadeInUp 0.7s ease-out 0.35s both; border-top: 3px solid #f05c5c; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(74,124,247,0.1); }
        .stat-icon { font-size: 28px; margin-bottom: 10px; display: block; }
        .stat-value {
            font-size: 36px; font-weight: 700; letter-spacing: -0.02em;
            animation: countUp 0.8s ease-out 0.5s both;
        }
        .stat-card:nth-child(1) .stat-value { color: var(--accent-blue); }
        .stat-card:nth-child(2) .stat-value { color: var(--accent-gold); }
        .stat-card:nth-child(3) .stat-value { color: #f05c5c; }
        .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 6px; }
        .stat-unit { font-size: 14px; font-weight: 400; opacity: 0.7; }

        /* Chart card */
        .chart-card {
            background: var(--bg-card); backdrop-filter: blur(16px);
            border: 1px solid rgba(74,124,247,0.1); border-radius: 16px;
            padding: 32px 28px;
            animation: fadeInUp 0.7s ease-out 0.45s both;
        }
        .chart-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        canvas { max-width: 100%; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .navbar { padding: 14px 16px; }
            .page-content { padding: 32px 16px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">Mentora</span></div>
        <div class="nav-links">
            <a href="/dashboard/{{ email }}">Dashboard</a>
            <a href="/resume/{{ email }}">Resume</a>
            <a href="/career-suggestions/{{ email }}">Career</a>
        </div>
    </nav>

    <div class="page-content">
        <div class="page-title">
            <h1>📊 Screen Time Analysis</h1>
            <p class="subtitle">Understand your digital habits at a glance</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">📱</span>
                <div class="stat-value">{{ summary.avg_daily_screen_time }}<span class="stat-unit">h</span></div>
                <div class="stat-label">Avg Daily Screen Time</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">💼</span>
                <div class="stat-value">{{ summary.avg_productive }}<span class="stat-unit">h</span></div>
                <div class="stat-label">Productive Time</div>
            </div>
            <div class="stat-card">
                <span class="stat-icon">🎮</span>
                <div class="stat-value">{{ summary.avg_social_media }}<span class="stat-unit">h</span></div>
                <div class="stat-label">Leisure Time</div>
            </div>
        </div>

        <div class="chart-card">
            <h2>Usage Breakdown</h2>
            <canvas id="usageChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('usageChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total Screen Time', 'Productive', 'Leisure'],
                datasets: [{
                    label: 'Hours per Day',
                    data: [{{ summary.avg_daily_screen_time }}, {{ summary.avg_productive }}, {{ summary.avg_social_media }}],
                    backgroundColor: ['rgba(74,124,247,0.7)', 'rgba(212,175,55,0.7)', 'rgba(240,92,92,0.7)'],
                    borderColor: ['#4a7cf7', '#d4af37', '#f05c5c'],
                    borderWidth: 2,
                    borderRadius: 8,
                    barPercentage: 0.5
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1a1d27',
                        titleColor: '#e8e8ef',
                        bodyColor: '#9ca3af',
                        borderColor: '#2a2d3a',
                        borderWidth: 1,
                        cornerRadius: 8
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { color: '#9ca3af', font: { family: 'Inter' } },
                        grid: { color: 'rgba(74,124,247,0.06)' },
                        title: { display: true, text: 'Hours', color: '#9ca3af', font: { family: 'Inter', size: 12 } }
                    },
                    x: {
                        ticks: { color: '#9ca3af', font: { family: 'Inter' } },
                        grid: { display: false }
                    }
                }
            }
        });
    </script>
</body>
</html>
