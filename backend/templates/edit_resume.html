<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Resume | Mentora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0a0f; --bg-card: rgba(20, 22, 32, 0.85);
            --accent-blue: #4a7cf7; --accent-blue-light: #7b9cff; --accent-gold: #d4af37;
            --text-primary: #e8e8ef; --text-secondary: #9ca3af; --border-color: #2a2d3a;
        }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background: var(--bg-primary); color: var(--text-primary); }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse at 40% 30%, rgba(74,124,247,0.05) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 40px; background: rgba(10,10,15,0.8);
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(74,124,247,0.1);
        }
        .navbar .logo { display: flex; align-items: center; gap: 10px; }
        .navbar .logo-icon { font-size: 24px; }
        .navbar .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-links { display: flex; gap: 28px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--text-primary); }

        .page-content { max-width: 600px; margin: 0 auto; padding: 48px 20px 60px; position: relative; z-index: 1; }
        .page-title { text-align: center; margin-bottom: 32px; animation: fadeInUp 0.7s ease-out; }
        .page-title h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }

        .form-card {
            background: var(--bg-card); backdrop-filter: blur(16px);
            border: 1px solid rgba(74,124,247,0.12); border-radius: 18px;
            padding: 36px 32px; position: relative; overflow: hidden;
            animation: fadeInUp 0.7s ease-out 0.1s both;
        }
        .form-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-gold), var(--accent-blue));
            background-size: 200% 100%; animation: shimmer 4s ease-in-out infinite;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--accent-gold); margin-bottom: 8px;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 13px 16px; border-radius: 10px;
            border: 1px solid var(--border-color);
            background: rgba(10,10,15,0.6); color: var(--text-primary);
            font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
            transition: all 0.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .form-group textarea { min-height: 70px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 0 12px rgba(74,124,247,0.15);
        }

        .btn-save {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            color: white; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; margin-top: 8px; transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(74,124,247,0.3);
        }
        .btn-save:hover { box-shadow: 0 6px 30px rgba(74,124,247,0.5); transform: translateY(-2px); }

        .back-link {
            display: block; text-align: center; margin-top: 20px;
            color: var(--text-secondary); text-decoration: none; font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent-blue); }

        @media (max-width: 600px) {
            .navbar { padding: 14px 16px; }
            .page-content { padding: 32px 16px; }
            .form-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><span class="logo-icon">⚡</span><span class="logo-text">Mentora</span></div>
        <div class="nav-links">
            <a href="/dashboard/{{ email }}">Dashboard</a>
            <a href="/resume/{{ email }}">Resume</a>
            <a href="/analysis/{{ email }}">Analysis</a>
        </div>
    </nav>
    <div class="page-content">
        <div class="page-title"><h1>✏️ Edit Your Resume</h1></div>
        <div class="form-card">
            <form method="POST">
                <div class="form-group"><label>👤 Name</label><input type="text" name="name" value="{{ user.name }}" id="editName"></div>
                <div class="form-group"><label>🎂 Age</label><input type="number" name="age" value="{{ user.age }}" id="editAge"></div>
                <div class="form-group"><label>🎓 Life Phase</label><input type="text" name="phase" value="{{ user.phase }}" id="editPhase"></div>
                <div class="form-group"><label>💡 Interests</label><textarea name="interests" id="editInterests">{{ user.interests }}</textarea></div>
                <div class="form-group"><label>🏆 Achievements</label><textarea name="achievements" id="editAchievements">{{ user.achievements }}</textarea></div>
                <div class="form-group"><label>🎨 Hobbies</label><textarea name="hobbies" id="editHobbies">{{ user.hobbies }}</textarea></div>
                <div class="form-group"><label>⚡ Struggles</label><textarea name="struggles" id="editStruggles">{{ user.struggles }}</textarea></div>
                <button type="submit" class="btn-save" id="saveResumeBtn">💾 Save Changes</button>
            </form>
            <a href="/resume/{{ email }}" class="back-link">← Back to Resume</a>
        </div>
    </div>
</body>
</html>
