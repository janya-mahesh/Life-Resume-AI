<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Mentora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12141c;
            --bg-card: rgba(20, 22, 32, 0.85);
            --accent-blue: #4a7cf7;
            --accent-blue-light: #7b9cff;
            --accent-gold: #d4af37;
            --text-primary: #e8e8ef;
            --text-secondary: #9ca3af;
            --border-color: #2a2d3a;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            background: var(--bg-primary);
            color: var(--text-primary);
            position: relative;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 30% 30%, rgba(74,124,247,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 70%, rgba(212,175,55,0.03) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Navbar */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 36px;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(74,124,247,0.1);
        }
        .navbar .logo { display: flex; align-items: center; gap: 10px; }
        .navbar .logo-icon { font-size: 22px; }
        .navbar .logo-text {
            font-size: 18px; font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a, .nav-link {
            color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--text-primary); }

        /* Suggested prompts */
        .suggested-prompts {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
            padding: 20px 20px 8px;
            position: relative; z-index: 1;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        .suggested-prompts button {
            padding: 9px 18px; border-radius: 24px;
            border: 1px solid rgba(74,124,247,0.25);
            background: rgba(74,124,247,0.08);
            color: var(--accent-blue-light);
            font-size: 13px; font-family: 'Inter', sans-serif; font-weight: 500;
            cursor: pointer; transition: all 0.3s;
        }
        .suggested-prompts button:hover {
            background: var(--accent-blue); color: white;
            box-shadow: 0 4px 16px rgba(74,124,247,0.3);
        }

        /* Chat container */
        .chat-main {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            padding: 12px 0 0; position: relative; z-index: 1;
        }
        .chat-container {
            width: 100%; max-width: 750px; flex: 1;
            display: flex; flex-direction: column;
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(74,124,247,0.1);
            border-radius: 18px 18px 0 0;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        /* Messages */
        .chat-messages {
            flex: 1; overflow-y: auto;
            padding: 24px 20px 12px;
            display: flex; flex-direction: column; gap: 14px;
            min-height: 400px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .msg { display: flex; align-items: flex-end; gap: 10px; animation: fadeInUp 0.4s ease-out; }
        .msg.bot { justify-content: flex-start; }
        .msg.user { justify-content: flex-end; }
        .msg .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .msg.bot .avatar { background: rgba(74,124,247,0.15); }
        .msg.user .avatar { background: rgba(212,175,55,0.15); }
        .msg .bubble {
            padding: 12px 16px; border-radius: 16px; font-size: 14px;
            max-width: 75%; line-height: 1.6; word-break: break-word;
        }
        .msg.bot .bubble {
            background: rgba(30,33,48,0.9); color: var(--text-secondary);
            border-bottom-left-radius: 4px;
        }
        .msg.user .bubble {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            color: white; border-bottom-right-radius: 4px;
        }
        .msg .bubble .btn-option {
            display: inline-block; margin-top: 8px; margin-right: 6px;
            padding: 7px 14px; border-radius: 10px;
            background: rgba(74,124,247,0.15); color: var(--accent-blue-light);
            border: 1px solid rgba(74,124,247,0.3);
            cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .msg .bubble .btn-option:hover { background: var(--accent-blue); color: white; }

        /* Typing indicator */
        .typing-indicator {
            display: none; align-items: center; gap: 8px;
            padding: 8px 20px; color: var(--text-secondary); font-size: 13px;
        }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-blue); animation: blink 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* Input bar */
        .chat-input-bar {
            display: flex; align-items: center; padding: 14px 18px;
            border-top: 1px solid rgba(74,124,247,0.1);
            background: rgba(10,10,15,0.5);
        }
        .chat-input-bar input {
            flex: 1; padding: 13px 16px; border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(10,10,15,0.6); color: var(--text-primary);
            font-size: 14px; outline: none; font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        .chat-input-bar input:focus { border-color: var(--accent-blue); }
        .chat-input-bar input::placeholder { color: #555; }
        .chat-input-bar button {
            margin-left: 10px; padding: 13px 24px; border: none;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-light));
            color: white; border-radius: 12px; cursor: pointer;
            font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .chat-input-bar button:hover { box-shadow: 0 4px 20px rgba(74,124,247,0.4); transform: translateY(-1px); }

        @media (max-width: 768px) {
            .navbar { padding: 12px 16px; }
            .chat-container { border-radius: 0; }
            .chat-messages { padding: 16px 12px; min-height: 300px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <span class="logo-icon">🤖</span>
            <span class="logo-text">Mentora Chat</span>
        </div>
        <div class="nav-links">
            <a class="nav-link" data-base="/dashboard/" href="#">Dashboard</a>
            <a class="nav-link" data-base="/resume/" href="#">Resume</a>
            <a class="nav-link" data-base="/analysis/" href="#">Analysis</a>
        </div>
    </div>

    <div class="chat-main">
        <div class="suggested-prompts">
            <button onclick="sendSuggested('Show my screen time')">📊 Screen time</button>
            <button onclick="sendSuggested('Give me career advice')">🚀 Career advice</button>
            <button onclick="sendSuggested('Motivate me')">💪 Motivate me</button>
            <button onclick="sendSuggested('Help me improve my habits')">🧠 Improve habits</button>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="msg bot">
                    <div class="avatar">🤖</div>
                    <div class="bubble">Hi! I'm <strong>Mentora</strong> 🤖 Your AI life coach. How can I help you today?</div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                Mentora is thinking...
            </div>
            <div class="chat-input-bar">
                <input type="text" id="chatInput" placeholder="Ask Mentora anything..." onkeydown="if(event.key==='Enter')sendChat()">
                <button onclick="sendChat()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        function getEmailFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('email') || '';
        }
        const email = getEmailFromUrl();

        // Update nav links with email
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.href = link.getAttribute('data-base') + email;
            });
        });

        function appendMsg(role, html) {
            const msgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            if (role === 'bot') {
                div.innerHTML = '<div class="avatar">🤖</div><div class="bubble">' + html + '</div>';
            } else {
                div.innerHTML = '<div class="bubble">' + html + '</div><div class="avatar">🧑</div>';
            }
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function showTyping() { document.getElementById('typingIndicator').style.display = 'flex'; }
        function hideTyping() { document.getElementById('typingIndicator').style.display = 'none'; }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            appendMsg('user', msg);
            input.value = '';
            showTyping();
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, email: email})
            })
            .then(r => r.json())
            .then(data => {
                hideTyping();
                if (Array.isArray(data)) {
                    data.forEach(m => {
                        let html = (m.text || '').replace(/\n/g, '<br>');
                        if (m.buttons) {
                            m.buttons.forEach(btn => {
                                html += '<button class="btn-option" onclick="sendBotOption(\'' + btn.payload.replace(/'/g, "\\'") + '\')">' + btn.title + '</button>';
                            });
                        }
                        appendMsg('bot', html);
                    });
                }
            })
            .catch(e => { hideTyping(); appendMsg('bot', 'Error: ' + e); });
        }

        function sendBotOption(payload) {
            appendMsg('user', payload);
            showTyping();
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: payload, email: email})
            })
            .then(r => r.json())
            .then(data => {
                hideTyping();
                if (Array.isArray(data)) {
                    data.forEach(m => {
                        let html = (m.text || '').replace(/\n/g, '<br>');
                        if (m.buttons) {
                            m.buttons.forEach(btn => {
                                html += '<button class="btn-option" onclick="sendBotOption(\'' + btn.payload.replace(/'/g, "\\'") + '\')">' + btn.title + '</button>';
                            });
                        }
                        appendMsg('bot', html);
                    });
                }
            })
            .catch(e => { hideTyping(); appendMsg('bot', 'Error: ' + e); });
        }

        function sendSuggested(text) {
            document.getElementById('chatInput').value = text;
            sendChat();
        }
    </script>
</body>
</html>
