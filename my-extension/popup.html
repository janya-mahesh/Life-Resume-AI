<!DOCTYPE html>
<html>
<head>
  <title>Mentora Extension</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 16px; background: #0a0a0f; color: #e8e8ef; width: 280px; }
    h2 { font-size: 16px; margin: 0 0 12px; color: #7b9cff; }
    label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 4px; margin-top: 10px; }
    input { padding: 8px 10px; width: 100%; border-radius: 8px; border: 1px solid #2a2d3a; background: #12141c; color: #e8e8ef; font-size: 13px; box-sizing: border-box; outline: none; }
    input:focus { border-color: #4a7cf7; }
    button { padding: 9px; width: 100%; background: linear-gradient(135deg, #4a7cf7, #7b9cff); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 12px; }
    button:hover { opacity: 0.9; }
    #status { font-size: 12px; color: #4a7cf7; margin-top: 8px; text-align: center; }
    .hint { font-size: 11px; color: #555; margin-top: 2px; }
  </style>
</head>
<body>
  <h2>Mentora Extension</h2>
  <label>Your Email</label>
  <input type="email" id="email" placeholder="you@example.com">
  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://mentora-ai.onrender.com">
  <p class="hint">Leave blank for localhost</p>
  <button id="saveBtn">Save Settings</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
